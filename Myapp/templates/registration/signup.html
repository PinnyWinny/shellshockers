{% extends 'shop/base.html' %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h2 class="mb-3">Create account</h2>
    <div class="text-muted mb-4">Sign up to save details and track orders (demo).</div>

    <form method="post" class="card p-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn boutique-btn mt-2" type="submit">Sign up</button>
    </form>

    <div class="mt-3">
      <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>
  </div>
</div>

<script>
  (function () {
    var inputs = document.querySelectorAll('input');
    for (var i = 0; i < inputs.length; i++) {
      if (!inputs[i].classList.contains('form-control') && inputs[i].type !== 'checkbox') {
        inputs[i].classList.add('form-control');
      }
    }
  })();
</script>

{% endblock %}
